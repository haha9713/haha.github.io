<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>布料供應商 | 精選布料目錄 </title>

<style>
/* （你的 CSS 完全保留，不變） */
:root {
    --primary-color: #0a2f57;
    --accent-color: #c09d6c;
    --bg-color: #fcfcfc;
    --card-bg: #ffffff;
    --text-main: #333333;
    --text-muted: #777777;
    --price-color: #d9534f;
    --promo-color: #2e7d32;
    --transition: all 0.3s ease;
    --header-height: 160px;
}
html { scroll-behavior: smooth; scroll-padding-top: var(--header-height); }
body {
    font-family: "PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    margin: 0;
    background-color: var(--bg-color);
    color: var(--text-main);
}
header {
    background:#fff;
    padding:20px 0 0 0;
    border-bottom:2px solid #f0f0f0;
    position:sticky;
    top:0;
    z-index:1000;
}
.title-container {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    margin-bottom:15px;
}
header h1 { margin:0;font-size:24px;color:var(--primary-color); }
.header-contact-btn {
    text-decoration:none;
    color:var(--accent-color);
    border:1.5px solid var(--accent-color);
    padding:6px 16px;
}
nav {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    padding:10px 15px 20px;
}
nav a {
    text-decoration:none;
    color:#333;
    background:#f5f5f5;
    padding:7px 15px;
    border-radius:25px;
}
main { max-width:1400px;margin:30px auto;padding:0 20px; }
.section-header { display:flex;align-items:center;margin-bottom:20px; }
.section-header h2 { font-size:20px;color:var(--primary-color); }
.section-header .number { color:var(--accent-color);margin-right:8px; }
.section-header .line { flex:1;height:1px;background:#e0e0e0;margin-left:15px; }

.category-info {
    background:#fff;
    border-left:5px solid var(--accent-color);
    padding:15px 20px;
    margin-bottom:25px;
}
.info-row { display:flex;padding:6px 0;border-bottom:1px dashed #eee; }
.info-row .label { min-width:75px;color:#777; }
.price { color:#d9534f;font-weight:bold; }
.promo { color:#2e7d32;font-weight:bold; }

.fabric-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}
.fabric-item { background:#fff; }
.image-box { aspect-ratio:3/4;background:#eee; }
.image-box img { width:100%;height:100%;object-fit:cover; }
</style>
</head>

<body>

<header>
    <div class="title-container">
        <h1>布料供應商</h1>
        <a href="http://facebook.com/cloth9713?" target="_blank" class="header-contact-btn">私訊聯絡</a>
    </div>

    <nav>
        <a href="#section-0">皺皺布</a>
        <a href="#section-1">格子系列</a>
        <a href="#stripe-fabric">條紋系列</a>
        <a href="#plain-fabric">素面系列</a>
        <a href="#section-2">四面彈防潑水</a>
        <a href="#section-3">聚酯羊毛</a>
        <a href="#section-4">TC布</a>
        <a href="#section-5">無彈尼龍</a>
    </nav>
</header>

<main>

<!-- 1 皺皺布 -->
<section id="section-0">
    <div class="section-header">
        <h2><span class="number">1.</span>皺皺布</h2>
        <div class="line"></div>
    </div>

    <div class="category-info">
        <div class="info-row"><span class="label">價格</span><span class="value price">一碼 60 元</span></div>
        <div class="info-row"><span class="label">優惠</span><span class="value promo">10碼以上 58 元，20碼以上 55 元 (可混搭)</span></div>
        <div class="info-row"><span class="label">材質</span><span class="value">經紗(棉)加緯紗尼龍</span></div>
        <div class="info-row"><span class="label">幅寬</span><span class="value">約120-132 公分</span></div>
        <div class="info-row"><span class="label">用途</span><span class="value">洋裝、睡衣、襯衫、褲子等</span></div>
        <div class="info-row"><span class="label">產地</span><span class="value">台灣大廠製造</span></div>
    </div>

    <div class="fabric-grid">
        <div class="fabric-item"><div class="image-box"><img src="img/60.jpg"></div></div>
        <div class="fabric-item"><div class="image-box"><img src="img/65.jpg"></div></div>
    </div>
</section>
